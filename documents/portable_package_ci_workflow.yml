name: Portable Package

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify ${{ matrix.target_tag }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            target_tag: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            target_tag: windows-x64
          - os: macos-14
            target: aarch64-apple-darwin
            target_tag: macos-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            target_tag: macos-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: ${{ matrix.target }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check formatting
        run: cargo fmt --check

      - name: Test workspace
        run: cargo test --all

      - name: Lint workspace
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Verify portable package
        run: python scripts/package_portable.py --target ${{ matrix.target }} --target-tag ${{ matrix.target_tag }} --verify
