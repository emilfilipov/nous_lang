name: Portable Package

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Verify on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check formatting
        run: cargo fmt --check

      - name: Test workspace
        run: cargo test --all

      - name: Lint workspace
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Verify shipped offline docs
        run: python offline_docs/verify_offline_docs.py

      - name: Build generated offline docs
        run: python offline_docs/generate_offline_docs.py

      - name: Verify generated offline docs
        run: python offline_docs/verify_offline_docs.py target/offline_docs/index.html --profile generated

      - name: Verify portable package
        run: python scripts/package_portable.py --verify
